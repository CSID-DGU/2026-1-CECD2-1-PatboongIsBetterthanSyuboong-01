# Docker compose profile. Every host below is a compose service name.
spring.jackson.time-zone=Asia/Seoul
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:bitcomputer}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Dd905925@}

spring.sql.init.mode=never

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

arangodb.hosts=${ARANGO_HOSTS:arangodb:8529}
arangodb.user=${ARANGO_USER:root}
arangodb.password=${ARANGO_PASSWORD:Dd905925@}
arangodb.database=${ARANGO_DATABASE:bitcomputer_graph}

ai.api.base-url=${FLASK_RADIOLOGY_BASE_URL:http://flask-radiology:5000}
ai.api.radiology-path=/api/ai/radiology_report

radiology.engine=${RADIOLOGY_ENGINE:xray}
xray.api.base-url=${XRAY_API_BASE_URL:http://xraygraph:8000}
xray.api.public-base-url=${XRAY_API_PUBLIC_BASE_URL:http://localhost:8000}
xray.api.path=/infer
xray.api.default-view=${XRAY_API_DEFAULT_VIEW:PA}
xray.api.top-k=${XRAY_API_TOP_K:10}

ai.certificate-agent.base-url=${CERTIFICATE_API_BASE_URL:http://certificate-api:5001}
ai.certificate-agent.path=/api/ai/document/generate

ai.prescription-agent.base-url=${PRESCRIPTION_AGENT_BASE_URL:http://prescription-api:8001}
ai.prescription-agent.path=/api/agent/prescription/recommend
ai.prescription-agent.feedback-path=/api/agent/prescription/feedback
ai.prescription-agent.embed.enabled=false

ai.validation-agent.base-url=${VALIDATION_AGENT_BASE_URL:http://validation-agent:8002}
ai.validation-agent.path=/api/agent/validation/run
validation.scheduler.enabled=${VALIDATION_SCHEDULER_ENABLED:false}
validation.scheduler.initial-delay-ms=${VALIDATION_SCHEDULER_INITIAL_DELAY_MS:15000}
validation.scheduler.fixed-delay-ms=${VALIDATION_SCHEDULER_FIXED_DELAY_MS:30000}
validation.scheduler.batch-size=${VALIDATION_SCHEDULER_BATCH_SIZE:5}
validation.scheduler.max-retries=${VALIDATION_SCHEDULER_MAX_RETRIES:3}
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
validation.rabbitmq.request-queue=${VALIDATION_RABBITMQ_REQUEST_QUEUE:validation.prescription.request}
validation.rabbitmq.result-queue=${VALIDATION_RABBITMQ_RESULT_QUEUE:validation.prescription.result}

gemini.api.key=${GEMINI_API_KEY:}
image.storage.path=${IMAGE_STORAGE_PATH:BitComputer/images}
